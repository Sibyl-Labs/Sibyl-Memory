name: Mirror to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject HF model-card frontmatter (runner-only; GitHub README stays clean)
        run: |
          printf '%s\n' \
            '---' \
            'license: mit' \
            'tags:' \
            '  - agent-memory' \
            '  - long-term-memory' \
            '  - llm' \
            '  - ai-agents' \
            '  - mcp' \
            '  - retrieval' \
            '  - sqlite' \
            '  - rag' \
            '---' \
            '' \
            '> **Read-only mirror of [`Sibyl-Labs/Sibyl-Memory`](https://github.com/Sibyl-Labs/Sibyl-Memory).** The canonical source is on GitHub. Install from PyPI: `pip install -U sibyl-memory-cli` · Docs: https://docs.sibyllabs.org/memory/ · Product: https://sibyllabs.org/plugin · Benchmarks: https://blog.sibylcap.com/beta-analysis' \
            '' > README.hf.md
          cat README.md >> README.hf.md
          mv README.hf.md README.md
          git config user.name sibyl
          git config user.email sibyl@sibyllabs.org
          git add README.md
          git commit -q -m "hf: model-card frontmatter for the mirror" || echo "README unchanged"

      - name: Push to Hugging Face Hub (retry on transient 429)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Token via credential helper (read from env at call time): never in the
          # remote URL, argv, or any error message git might print.
          git config credential.helper '!f() { echo "username=sibyllabs"; echo "password=${HF_TOKEN}"; }; f'
          for i in 1 2 3 4 5; do
            if git push --force "https://huggingface.co/SibylLabsLLC/Sibyl-Memory" HEAD:main; then
              echo "mirror pushed on attempt $i"; exit 0
            fi
            echo "attempt $i failed (likely transient HF 429); backing off"; sleep $((i*15))
          done
          echo "all push attempts failed"; exit 1
